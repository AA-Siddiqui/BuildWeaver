name: Docker Health Check

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  docker-healthcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t buildweaver-api .

      - name: Run container
        run: |
          docker run -d \
            -e DATABASE_URL=${{secrets.TEST_DATABASE_URL}} \
            -e VITE_API_BASE_URL=${{secrets.TEST_VITE_API_BASE_URL}} \
            -e PORT=${{secrets.TEST_PORT}} \
            -e EDITOR_ORIGIN=${{secrets.TEST_EDITOR_ORIGIN}} \
            -e BCRYPT_ROUNDS=${{secrets.TEST_BCRYPT_ROUNDS}} \
            -e JWT_SECRET=${{secrets.TEST_JWT_SECRET}} \
            --name buildweaver-api-test \
            -p 3000:3000 \
            buildweaver-api

      - name: Wait for health endpoint or timeout
        run: |
          END_TIME=$((SECONDS+180))
          until curl -fs http://localhost:3000/health; do
            if [ $SECONDS -ge $END_TIME ]; then
              echo "Timeout waiting for health endpoint"
              docker logs buildweaver-api-test
              exit 1
            fi
            sleep 5
          done

      - name: Stop container
        if: always()
        run: docker rm -f buildweaver-api-test
