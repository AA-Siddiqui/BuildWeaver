name: CI

on:
  pull_request:
    branches: [main]

env:
  FORCE_COLOR: '1'

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - '@buildweaver/editor'
          - '@buildweaver/api'
          - '@buildweaver/libs'
          - '@buildweaver/db'
          - '@buildweaver/codegen'
          - '@buildweaver/ui'
          - '@buildweaver/llm'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm --filter ${matrix.target} lint

  typecheck:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        target:
          - '@buildweaver/editor'
          - '@buildweaver/api'
          - '@buildweaver/libs'
          - '@buildweaver/db'
          - '@buildweaver/codegen'
          - '@buildweaver/ui'
          - '@buildweaver/llm'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm --filter ${matrix.target} typecheck

  test:
    runs-on: ubuntu-latest
    needs: typecheck
    strategy:
      matrix:
        target:
          - '@buildweaver/editor'
          - '@buildweaver/api'
          - '@buildweaver/libs'
          - '@buildweaver/db'
          - '@buildweaver/codegen'
          - '@buildweaver/ui'
          - '@buildweaver/llm'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm --filter ${matrix.target} test

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        target:
          - '@buildweaver/editor'
          - '@buildweaver/api'
          - '@buildweaver/libs'
          - '@buildweaver/db'
          - '@buildweaver/codegen'
          - '@buildweaver/ui'
          - '@buildweaver/llm'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm --filter ${matrix.target} build
