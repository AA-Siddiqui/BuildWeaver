# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - buildweaver-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: pnpm install and build
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Create deployment bundle
        run: |
          pnpm --filter @buildweaver/api deploy deployment
          cd deployment
          cat <<'EOF' > .env
          DATABASE_URL=postgresql://neondb_owner:npg_qEJ8KiCHxro7@ep-lingering-moon-a1qroz6s-pooler.ap-southeast-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
          PORT=3000
          EDITOR_ORIGIN=https://www.buildweaver.dev
          BCRYPT_ROUNDS=12
          JWT_SECRET=a393d0ab095a2c4dd25e262dcd46e06e
          EOF

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: api-deployment
          path: deployment

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: api-deployment
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_89114575604D4C6581BEF9318175381E }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_5330F2DC26884F7C81C90906D14AAEFB }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_468B4468135B4361A564035BFC78037E }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'buildweaver-api'
          slot-name: 'Production'
          package: ./deployment
          